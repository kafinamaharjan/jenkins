services:
  app:
    build: .
    image: ${IMAGE_NAME:-string-theory-guitars}:${IMAGE_TAG:-latest}
    ports:
      - "3388:3000"
    environment:
      DATABASE_URL: postgres://guitar:guitar@db:5432/guitarshop
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guitarshop
      POSTGRES_USER: guitar
      POSTGRES_PASSWORD: guitar
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guitar -d guitarshop"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
volumes:
  postgres_data:
